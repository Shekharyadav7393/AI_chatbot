services:
  - type: web
    name: ai-chatbot-backend
    env: python

    rootDir: backend

    buildCommand: pip install -r requirements.txt

    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT

    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-chatbot-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: GEMINI_API_KEY
        sync: false

      - key: GEMINI_MODEL
        value: gemini-2.5-flash

      - key: TRANSFORMERS_OFFLINE
        value: "0"
  - type: web
    name: ai-chatbot-frontend
    env: static

    rootDir: frontend

    buildCommand: npm install && npm run build

    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    autoDeploy: true

    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-chatbot-backend
          envVarKey: RENDER_EXTERNAL_URL

# =========================
# PostgreSQL
# =========================

databases:
  - name: ai-chatbot-db
    databaseName: chatbot_db
    user: chatbot_user
    plan: free